name: "Build Nothing Phone 2a Kernel (KernelSU + SuSFS)"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: "Build MT6886 Kernel"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          verbose: 'true'

      - name: Setup SWAP 16GB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            gcc-aarch64-linux-gnu git libelf-dev libssl-dev lz4 \
            python3 python3-pip zip unzip device-tree-compiler \
            libfl-dev rsync

      - name: Clone kernel source
        run: |
          git clone --depth=1 --branch ksun-test https://github.com/n0escape-exe/android_kernel_nothing_mt6886.git kernel
          cd kernel
          
          # Initialize submodules manually (KernelSU)
          git submodule update --init --recursive --depth=1 2>&1 || echo "Submodule init failed, trying manual..."
          
          # If submodule failed, clone KernelSU manually
          if [ ! -d "common/KernelSU/kernel" ]; then
            echo "=== Manual KernelSU clone ==="
            cd common
            git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU KernelSU
            cd ..
          fi
          
          # Verify
          echo "=== KernelSU check ==="
          ls common/KernelSU/kernel/ 2>/dev/null | head -5
          ls common/drivers/kernelsu/ 2>/dev/null | head -5
          
          # If kernelsu is a broken symlink, fix it
          if [ ! -f "common/drivers/kernelsu/Makefile" ]; then
            echo "=== Fixing kernelsu symlink ==="
            rm -f common/drivers/kernelsu
            ln -sf ../KernelSU/kernel common/drivers/kernelsu
            ls -la common/drivers/kernelsu
          fi

      - name: Setup Clang
        run: |
          # Try downloading AOSP clang
          cd kernel
          if [ -d "prebuilts/clang/host/linux-x86" ]; then
            CLANG_DIR=$(ls -d prebuilts/clang/host/linux-x86/clang-* 2>/dev/null | head -1)
          fi
          
          if [ -z "$CLANG_DIR" ]; then
            echo "Downloading AOSP clang..."
            git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android14-release ../clang-repo
            CLANG_DIR=$(ls -d ../clang-repo/clang-* 2>/dev/null | head -1)
          fi
          
          CLANG_BIN="$GITHUB_WORKSPACE/$CLANG_DIR/bin"
          echo "CLANG_BIN=$CLANG_BIN" >> $GITHUB_ENV
          $CLANG_BIN/clang --version | head -1

      - name: Build kernel
        working-directory: kernel/common
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CC="${CLANG_BIN}/clang"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export STRIP=llvm-strip
          export LLVM=1
          export LLVM_IAS=1
          export PATH="${CLANG_BIN}:$PATH"
          
          # Merge defconfigs
          echo "=== Merging defconfigs ==="
          scripts/kconfig/merge_config.sh \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/mgk_64_k515_defconfig \
            arch/arm64/configs/lineage.config
          
          echo "=== KSU Config ==="
          grep -E "CONFIG_KSU|CONFIG_KSU_SUSFS" .config
          
          make olddefconfig
          
          echo "=== Building kernel ==="
          make -j$(nproc) 2>&1 | tee ../../build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "=== Build exit: $BUILD_EXIT ==="
          exit $BUILD_EXIT

      - name: Package kernel
        if: success()
        run: |
          mkdir -p output
          cp kernel/common/arch/arm64/boot/Image output/ 2>/dev/null
          cp kernel/common/arch/arm64/boot/Image.lz4 output/ 2>/dev/null
          find kernel/common/arch/arm64/boot/dts/mediatek/ -name "*.dtb" -o -name "*.dtbo" 2>/dev/null | while read f; do cp "$f" output/; done
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cp output/* ak3/
          cd ak3 && zip -r9 ../output/nothing2a-kernel.zip . && cd ..
          ls -lah output/

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nothing2a-kernel
          path: output/

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v$(date +%Y%m%d)-ksu-susfs"
          name: "Nothing Phone 2a Kernel - $(date +%Y-%m-%d)"
          files: output/*
          generate_release_notes: true
