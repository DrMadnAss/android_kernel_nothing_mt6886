name: "Build Nothing Phone 2a Kernel (KernelSU + SuSFS)"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: "Build MT6886 Kernel"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          verbose: 'true'

      - name: Setup SWAP 16GB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            gcc-aarch64-linux-gnu git libelf-dev libssl-dev lz4 \
            python3 zip unzip device-tree-compiler libfl-dev rsync

      - name: Clone and prepare kernel
        run: |
          git clone --depth=1 --branch ksun-test https://github.com/n0escape-exe/android_kernel_nothing_mt6886.git kernel
          cd kernel
          
          # Clone KernelSU manually
          cd common
          git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU KernelSU
          
          # Fix symlink
          rm -rf drivers/kernelsu
          ln -sf ../KernelSU/kernel drivers/kernelsu
          
          # Verify
          echo "=== KernelSU ==="
          ls drivers/kernelsu/Kconfig
          head -5 drivers/kernelsu/Kconfig
          
          cd ../..

      - name: Build kernel
        working-directory: kernel
        run: |
          # Use repo's prebuilt clang or system clang
          CLANG_DIR=$(ls -d prebuilts/clang/host/linux-x86/clang-* 2>/dev/null | head -1)
          if [ -n "$CLANG_DIR" ] && [ -f "$CLANG_DIR/bin/clang" ]; then
            echo "Using repo clang: $CLANG_DIR"
            export PATH="$CLANG_DIR/bin:$PATH"
          else
            echo "Using system clang"
            sudo apt-get install -y clang lld llvm
          fi
          
          clang --version | head -1
          
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export STRIP=llvm-strip
          export LLVM=1
          export LLVM_IAS=1
          
          cd common
          
          # Merge configs
          scripts/kconfig/merge_config.sh \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/mgk_64_k515_defconfig \
            arch/arm64/configs/lineage.config
          
          echo "=== KSU Config ==="
          grep -E "CONFIG_KSU|CONFIG_KSU_SUSFS" .config
          
          make olddefconfig
          
          echo "=== Building ==="
          make -j$(nproc) 2>&1
          echo "=== EXIT: ${PIPESTATUS[0]} ==="

      - name: Package
        if: success()
        run: |
          mkdir -p output
          cp kernel/common/arch/arm64/boot/Image output/ 2>/dev/null
          cp kernel/common/arch/arm64/boot/Image.lz4 output/ 2>/dev/null
          find kernel/common/arch/arm64/boot/dts/mediatek/ -name "*.dtb" -o -name "*.dtbo" 2>/dev/null | while read f; do cp "$f" output/; done
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cp output/* ak3/
          cd ak3 && zip -r9 ../output/nothing2a-kernel.zip . && cd ..
          ls -lah output/

      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nothing2a-kernel
          path: output/

      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v$(date +%Y%m%d)-ksu-susfs"
          name: "Nothing Phone 2a Kernel - $(date +%Y-%m-%d)"
          files: output/*
          generate_release_notes: true
