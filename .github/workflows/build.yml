name: "Build Nothing Phone 2a Kernel (KernelSU + SuSFS)"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: "Build MT6886 Kernel"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          verbose: 'true'

      - name: Setup SWAP 16GB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            gcc-aarch64-linux-gnu git libelf-dev libssl-dev lz4 \
            python3 python3-pip zip unzip device-tree-compiler \
            libfl-dev rsync

      - name: Clone kernel source
        run: |
          echo "=== Cloning kernel source ==="
          git clone --depth=1 --branch ksun-test --recurse-submodules \
            https://github.com/n0escape-exe/android_kernel_nothing_mt6886.git kernel
          echo "=== Clone done ==="
          ls kernel/
          echo "=== Common dir ==="
          ls kernel/common/ 2>/dev/null | head -10
          echo "=== KernelSU check ==="
          ls kernel/common/KernelSU/ 2>/dev/null | head -5
          ls kernel/common/drivers/kernelsu/ 2>/dev/null | head -5

      - name: Setup Clang toolchain
        run: |
          cd kernel
          # Check for prebuilt clang in repo
          if [ -d "prebuilts/clang/host/linux-x86" ]; then
            CLANG_DIR=$(ls -d prebuilts/clang/host/linux-x86/clang-* 2>/dev/null | head -1)
            if [ -n "$CLANG_DIR" ]; then
              echo "Using repo clang: $CLANG_DIR"
              echo "CLANG_PATH=$GITHUB_WORKSPACE/$CLANG_DIR/bin" >> $GITHUB_ENV
              echo "PATH=$GITHUB_WORKSPACE/$CLANG_DIR/bin:$PATH" >> $GITHUB_ENV
              $CLANG_DIR/bin/clang --version | head -1
              exit 0
            fi
          fi
          
          # Fallback: download AOSP clang
          echo "Downloading AOSP clang..."
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android14-release clang-toolchain
          CLANG_PATH=$(ls -d clang-toolchain/clang-* 2>/dev/null | head -1)
          echo "CLANG_PATH=$GITHUB_WORKSPACE/$CLANG_PATH/bin" >> $GITHUB_ENV
          echo "PATH=$GITHUB_WORKSPACE/$CLANG_PATH/bin:$PATH" >> $GITHUB_ENV
          $CLANG_PATH/bin/clang --version | head -1

      - name: Build kernel
        working-directory: kernel/common
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LLVM=1
          export LLVM_IAS=1
          
          # Merge configs
          echo "=== Merging defconfigs ==="
          scripts/kconfig/merge_config.sh \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/mgk_64_k515_defconfig \
            arch/arm64/configs/lineage.config
          
          # Verify KSU/SUSFS
          echo "=== KSU Config ==="
          grep -E "CONFIG_KSU|CONFIG_KSU_SUSFS" .config
          
          make olddefconfig
          
          echo "=== Building kernel (this takes 1-2 hours) ==="
          make -j$(nproc) 2>&1 | tail -20
          
          BUILD_EXIT=$?
          echo "=== Build exit: $BUILD_EXIT ==="
          exit $BUILD_EXIT

      - name: Find and package kernel
        if: success()
        run: |
          mkdir -p output
          
          # Find kernel image
          KERNEL_IMG=""
          for f in kernel/common/arch/arm64/boot/Image kernel/common/arch/arm64/boot/Image.lz4; do
            if [ -f "$f" ]; then
              KERNEL_IMG="$f"
              echo "Found kernel: $f ($(du -h "$f" | cut -f1))"
              break
            fi
          done
          
          if [ -z "$KERNEL_IMG" ]; then
            echo "ERROR: No kernel image found!"
            find kernel/common/arch/arm64/boot/ -type f 2>/dev/null
            exit 1
          fi
          
          cp "$KERNEL_IMG" output/
          
          # Find DTB/DTBO
          find kernel/common/arch/arm64/boot/dts/mediatek/ -name "mt6886*.dtb" -o -name "k6886*.dtbo" 2>/dev/null | while read dtb; do
            cp "$dtb" output/
            echo "DTB: $dtb"
          done
          
          # Create AnyKernel3 zip
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cp output/Image* ak3/
          cp output/*.dtb output/*.dtbo ak3/ 2>/dev/null || true
          
          cd ak3
          zip -r9 ../output/nothing2a-kernel-kernelsu-susfs.zip .
          cd ..
          
          echo "=== Output ==="
          ls -lah output/

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nothing2a-kernel
          path: output/

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v$(date +%Y%m%d)-ksu-susfs"
          name: "Nothing Phone 2a Kernel - KernelSU + SuSFS - $(date +%Y-%m-%d)"
          files: output/*
          generate_release_notes: true
