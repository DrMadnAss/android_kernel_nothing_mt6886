name: "Build Nothing Phone 2a Kernel (KernelSU + SuSFS)"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: "Build MT6886 Kernel"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          verbose: 'true'

      - name: Setup SWAP 16GB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bc bison build-essential ccache curl flex \
            clang lld llvm gcc-aarch64-linux-gnu git libelf-dev libssl-dev lz4 \
            python3 zip unzip device-tree-compiler libfl-dev rsync
          # Create ncurses symlinks for AOSP clang
          # Symlink AOSP clang to system path for bpf tools
          AOSP_CLANG=$(ls -d prebuilts/clang/host/linux-x86/clang-r487747c/bin/clang 2>/dev/null || ls -d clang-repo/clang-*/bin/clang 2>/dev/null | head -1)
          if [ -n "$AOSP_CLANG" ]; then
            sudo ln -sf "$AOSP_CLANG" /usr/local/bin/clang
            sudo ln -sf "$(dirname $AOSP_CLANG)/ld.lld" /usr/local/bin/ld.lld 2>/dev/null || true
          fi
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libncursesw.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5 2>/dev/null || true
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5 2>/dev/null || true

      - name: Clone kernel and add KernelSU
        run: |
          git clone --depth=1 --branch mt6886/Pacman/t \
            https://github.com/AbzRaider/android_kernel-5.15_nothing_mt6886.git kernel
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          cat > arch/arm64/configs/kernelsu.config << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF

      - name: Build kernel
        working-directory: kernel
        run: |
          # Use AOSP clang from prebuilts
          CLANG_DIR=$(ls -d prebuilts/clang/host/linux-x86/clang-* 2>/dev/null | head -1)
          if [ -z "$CLANG_DIR" ] || [ ! -f "$CLANG_DIR/bin/clang" ]; then
            git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android14-release ../clang-repo
            CLANG_DIR=$(ls -d ../clang-repo/clang-r487747c 2>/dev/null || ls -d ../clang-repo/clang-* 2>/dev/null | head -1)
          fi
          export PATH="$CLANG_DIR/bin:$PATH"
          clang --version | head -1
          
          export ARCH=arm64 SUBARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu-
          export LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy STRIP=llvm-strip LLVM=1 LLVM_IAS=1
          
          scripts/kconfig/merge_config.sh arch/arm64/configs/gki_defconfig arch/arm64/configs/pacman.config arch/arm64/configs/kernelsu.config
          grep -c "CONFIG_KSU" .config
          make olddefconfig
          make -j$(nproc) 2>&1
          EXIT=${PIPESTATUS[0]}
          echo "=== EXIT: $EXIT ==="
          exit $EXIT

      - name: Package
        if: success()
        run: |
          mkdir -p output
          cp kernel/arch/arm64/boot/Image output/ 2>/dev/null
          cp kernel/arch/arm64/boot/Image.lz4 output/ 2>/dev/null
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cp output/* ak3/
          cd ak3 && zip -r9 ../output/nothing2a-kernel.zip . && cd ..
          ls -lah output/

      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nothing2a-kernel
          path: output/

      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v$(date +%Y%m%d)-ksu-susfs"
          name: "Nothing Phone 2a Kernel - $(date +%Y-%m-%d)"
          files: output/*
          generate_release_notes: true
