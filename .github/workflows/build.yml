name: "Build Nothing Phone 2a Kernel (KernelSU + SuSFS)"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: "Build MT6886 Kernel"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          verbose: 'true'

      - name: Setup SWAP 16GB
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Setup build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libncurses5 bc bison build-essential ccache curl flex \
          # Create ncurses symlinks
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libncursesw.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5 2>/dev/null || true
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5 2>/dev/null || true
            gcc-aarch64-linux-gnu git libelf-dev libssl-dev lz4 \
            python3 zip unzip device-tree-compiler libfl-dev rsync

      - name: Clone kernel and add KernelSU
        run: |
          # Clone COMPLETE kernel source from AbzRaider (has all vendor files)
          git clone --depth=1 --branch mt6886/Pacman/t \
            https://github.com/AbzRaider/android_kernel-5.15_nothing_mt6886.git kernel
          
          cd kernel
          
          # Add ReSukiSU + SuSFS
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          
          # Verify KernelSU is integrated
          echo "=== KernelSU ==="
          ls drivers/kernelsu/Kconfig 2>/dev/null || echo "Kconfig missing"
          head -5 drivers/kernelsu/Kconfig 2>/dev/null
          
          # Create KSU config fragment
          cat > arch/arm64/configs/kernelsu.config << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF
          
          cd ..

      - name: Setup Clang
        run: |
          # Download AOSP clang
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            -b android14-release clang-repo 2>/dev/null || true
          
          CLANG_DIR=$(ls -d clang-repo/clang-r487747c 2>/dev/null || ls -d clang-repo/clang-* 2>/dev/null | head -1)
          if [ -n "$CLANG_DIR" ] && [ -f "$CLANG_DIR/bin/clang" ]; then
            echo "Using AOSP clang: $CLANG_DIR"
            echo "CLANG_BIN=$GITHUB_WORKSPACE/$CLANG_DIR/bin" >> $GITHUB_ENV
          else
            echo "Using system clang"
            sudo apt-get install -y clang lld llvm
            echo "CLANG_BIN=/usr/bin" >> $GITHUB_ENV
          fi

      - name: Build kernel
        working-directory: kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export STRIP=llvm-strip
          export LLVM=1
          export LLVM_IAS=1
          export PATH="${CLANG_BIN}:$PATH"
          
          # Merge configs: gki_defconfig + pacman.config + kernelsu.config
          scripts/kconfig/merge_config.sh \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/pacman.config \
            arch/arm64/configs/kernelsu.config
          
          echo "=== KSU Config ==="
          grep -E "CONFIG_KSU|CONFIG_KSU_SUSFS" .config
          
          make olddefconfig
          
          echo "=== Building ==="
          make -j$(nproc) 2>&1
          EXIT=${PIPESTATUS[0]}
          echo "=== EXIT: $EXIT ==="
          exit $EXIT

      - name: Package
        if: success()
        run: |
          mkdir -p output
          cp kernel/arch/arm64/boot/Image output/ 2>/dev/null
          cp kernel/arch/arm64/boot/Image.lz4 output/ 2>/dev/null
          find kernel/arch/arm64/boot/dts/mediatek/ -name "*.dtb" -o -name "*.dtbo" 2>/dev/null | while read f; do cp "$f" output/; done
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cp output/* ak3/
          cd ak3 && zip -r9 ../output/nothing2a-kernel.zip . && cd ..
          ls -lah output/

      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nothing2a-kernel
          path: output/

      - name: Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v$(date +%Y%m%d)-ksu-susfs"
          name: "Nothing Phone 2a Kernel - $(date +%Y-%m-%d)"
          files: output/*
          generate_release_notes: true
